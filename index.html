<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thassos Ferry Timetable 2026</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:sans-serif;background:#f6f7fb;margin:0}
.container{max-width:700px;margin:auto;padding:16px}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:10px}
.next{background:#2563eb;color:#fff;padding:20px;border-radius:16px}
.row{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #eee}
</style>
</head>
<body>
<div class="container">
<div class="next">
<div id="nextTime">--:--</div>
<div id="nextMeta">Loading...</div>
</div>
<div id="list"></div>
<div class="card" id="weather"></div>
</div>

<script>
const COS={TF:"Thassos Ferries",TL:"Thassos Link",AF:"Aneth Ferries",TS:"Thassos Seaways"};
let timetable=null;

function toMin(t){const[h,m]=t.split(':');return h*60+m*1}
function nowMin(){const d=new Date();return d.getHours()*60+d.getMinutes()}

function render(){
 if(!timetable)return;
 const now=nowMin();
 const schedule=timetable.from_keramoti.map(r=>({time:r[0],co:r[1]}));
 const next=schedule.find(s=>toMin(s.time)>now);

 document.getElementById("nextTime").textContent=next?next.time:"--";
 document.getElementById("nextMeta").textContent=next?"Next ferry":"No more";

 document.getElementById("list").innerHTML=schedule.map(s=>`
 <div class="row">
   <span>${s.time}</span>
   <span>${COS[s.co]}</span>
 </div>`).join('');
}

fetch("timetable.json").then(r=>r.json()).then(d=>{timetable=d;render()});

fetch("https://api.open-meteo.com/v1/forecast?latitude=40.85&longitude=24.7&current_weather=true")
.then(r=>r.json())
.then(d=>{
 const w=d.current_weather;
 document.getElementById("weather").innerHTML=`Weather: ${w.temperature}°C Wind ${w.windspeed}km/h`;
});
</script>
</body>
</html>
